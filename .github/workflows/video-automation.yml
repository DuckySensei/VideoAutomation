# Scheduled / manual run of the autonomous pipeline (trends → render → upload hooks).
#
# Setup (GitHub → repo → Settings → Secrets and variables → Actions):
#   YT_CLIENT_ID, YT_CLIENT_SECRET, YT_REFRESH_TOKEN  — Google OAuth for YouTube API
#   YOUTUBE_UPLOAD_COMMAND — same string as in config/autonomous.env.example (quotes preserved)
#   METRICS_IMPORT_COMMAND — optional; omit to skip metrics hook
#   YT_TOKEN_URI — optional; defaults to https://oauth2.googleapis.com/token
#
# Large media (*.mp3 / *.mp4) is gitignored. Supply assets via S3 sync or a self-hosted runner:
#
#   S3 — create a private prefix with the same filenames as assets/licenses/manifest.csv
#   (e.g. s3://your-bucket/videoautomation-media/sample_bg_001.mp4).
#   Secrets: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_REGION (e.g. us-east-1),
#   S3_MEDIA_PREFIX = s3://your-bucket/videoautomation-media/  (trailing slash)
#   IAM: s3:ListBucket on the prefix + s3:GetObject on objects under that prefix.
#
#   Self-hosted runner — copy assets/media onto the machine once; omit AWS media secrets.
#
# Public forks: scheduled workflows are disabled by default; enable in Actions tab if needed.

name: Video automation

on:
  schedule:
    # Every 5 days at 16:00 UTC (roughly 10 videos / 5-day batch at 12h spacing)
    - cron: "0 16 */5 * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: video-automation-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    # Required for "Environment secrets" (Settings → Environments → your env).
    # Repository secrets still work; environment secrets only apply when this is set.
    environment: Video Automater
    timeout-minutes: 120
    env:
      YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
      YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
      YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
      YT_TOKEN_URI: ${{ secrets.YT_TOKEN_URI }}
      YOUTUBE_UPLOAD_COMMAND: ${{ secrets.YOUTUBE_UPLOAD_COMMAND }}
      INSTAGRAM_UPLOAD_COMMAND: ${{ secrets.INSTAGRAM_UPLOAD_COMMAND }}
      METRICS_IMPORT_COMMAND: ${{ secrets.METRICS_IMPORT_COMMAND }}
      INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
      INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
      INSTAGRAM_VIDEO_URL_BASE: ${{ secrets.INSTAGRAM_VIDEO_URL_BASE }}

    steps:
      - uses: actions/checkout@v4

      # Do not use apt install awscli — not available on Ubuntu 24.04+ runners. Official bundle works everywhere.
      - name: Install FFmpeg and unzip
        run: sudo apt-get update && sudo apt-get install -y ffmpeg unzip

      - name: Install AWS CLI v2
        run: |
          curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscliv2.zip
          unzip -q /tmp/awscliv2.zip -d /tmp
          sudo /tmp/aws/install --update
          aws --version

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Default YT_TOKEN_URI if unset
        run: |
          echo "YT_TOKEN_URI=${YT_TOKEN_URI:-https://oauth2.googleapis.com/token}" >> "$GITHUB_ENV"

      # secrets cannot be used in step `if:` — skip in script when unset.
      - name: Sync media from S3 (optional)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          S3_MEDIA_PREFIX: ${{ secrets.S3_MEDIA_PREFIX }}
        run: |
          if [ -z "${AWS_ACCESS_KEY_ID:-}" ] || [ -z "${AWS_SECRET_ACCESS_KEY:-}" ] || [ -z "${S3_MEDIA_PREFIX:-}" ]; then
            echo "S3 media sync not configured; skipping (set AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, S3_MEDIA_PREFIX)."
            exit 0
          fi
          set -euo pipefail
          mkdir -p assets/media
          export AWS_DEFAULT_REGION="${AWS_REGION:-us-east-1}"
          aws s3 sync "$S3_MEDIA_PREFIX" assets/media/

      - name: Check required media paths from manifest
        run: |
          python - <<'PY'
          import csv
          import sys
          from pathlib import Path

          missing: list[str] = []
          with open("assets/licenses/manifest.csv", newline="", encoding="utf-8") as f:
              for row in csv.DictReader(f):
                  p = (row.get("file_path") or "").strip()
                  if p and not Path(p).is_file():
                      missing.append(p)
          for p in missing:
              print(f"::warning::Missing file (gitignored or not downloaded): {p}")
          if missing:
              print(
                  "::error::Manifest assets missing after S3 sync. Ensure S3_MEDIA_PREFIX matches your bucket "
                  "(files named like sample_bg_001.mp4 in that prefix), IAM allows s3:ListBucket and s3:GetObject, "
                  "and AWS secrets are set on this repository or environment. "
                  "Self-hosted: place files under assets/media/ on the runner."
              )
              sys.exit(1)
          PY

      - name: Run autonomous cycle
        run: |
          python src/autonomous_service.py \
            --base-dir . \
            --monthly-fixed-cost 50 \
            --enable-upload-hook \
            --enable-instagram-hook \
            --enable-metrics-hook

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: autonomous-report
          path: output/autonomous_report.json
          if-no-files-found: ignore
